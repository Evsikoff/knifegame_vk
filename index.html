<!doctype html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover' />
    <meta charset='utf-8'>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <style></style>
    <title>Кизлярский нож</title>
    <!-- VK Bridge SDK -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="playcanvas-stable.min.js"></script>
    <script src="__settings__.js"></script>
</head>
<body>
    <script src="__modules__.js"></script>
    <script src="__start__.js"></script>
    <script src="__loading__.js"></script>

    <!-- VK Bridge initialization and global handlers -->
    <script>
        // Global variables for VK Bridge
        window.vkBridgeReady = false;

        // Detect platform: Odnoklassniki or VK
        var _urlParams = new URLSearchParams(window.location.search);
        window.isOdnoklassniki = (_urlParams.get('vk_client') === 'ok');

        // Block right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Block long-press context menu on mobile
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent pull-to-refresh
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent scroll on body
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Initialize VK Bridge with timeout fallback for non-VK environments
        function initVKBridge() {
            var timeoutId = null;

            var bridgePromise = vkBridge.send('VKWebAppInit')
                .then(function(data) {
                    clearTimeout(timeoutId);
                    if (data.result) {
                        window.vkBridgeReady = true;
                        console.log('VK Bridge initialized successfully');
                    }
                    return data.result;
                })
                .catch(function(error) {
                    clearTimeout(timeoutId);
                    console.error('VK Bridge initialization failed:', error);
                    window.vkBridgeReady = false;
                    return false;
                });

            var timeoutPromise = new Promise(function(resolve) {
                timeoutId = setTimeout(function() {
                    console.warn('VK Bridge init timed out — running outside VK iframe?');
                    window.vkBridgeReady = false;
                    resolve(false);
                }, 3000);
            });

            return Promise.race([bridgePromise, timeoutPromise]);
        }

        // Helper: race a promise against a timeout
        function withTimeout(promise, ms, fallback) {
            var timeout = new Promise(function(resolve) {
                setTimeout(function() { resolve(fallback); }, ms);
            });
            return Promise.race([promise, timeout]);
        }

        // VK Storage save function (replaces Yandex Cloud save)
        window.saveToVKStorage = function(data) {
            var progressString = JSON.stringify(data);
            return withTimeout(
                vkBridge.send('VKWebAppStorageSet', {
                    key: 'gameState',
                    value: progressString
                })
                    .then(function(res) {
                        if (res.result) {
                            console.log('Data saved to VK Storage');
                        }
                        return res.result;
                    })
                    .catch(function(error) {
                        console.error('Failed to save to VK Storage:', error);
                        return false;
                    }),
                3000, false
            );
        };

        // VK Storage load function (replaces Yandex Cloud load)
        window.loadFromVKStorage = function() {
            return withTimeout(
                vkBridge.send('VKWebAppStorageGet', { keys: ['gameState'] })
                    .then(function(data) {
                        if (data.keys) {
                            var entry = data.keys.find(function(k) { return k.key === 'gameState'; });
                            if (entry && entry.value) {
                                var progressObj = JSON.parse(entry.value);
                                console.log('Data loaded from VK Storage:', progressObj);
                                return progressObj;
                            }
                        }
                        return null;
                    })
                    .catch(function(error) {
                        console.error('Failed to load from VK Storage:', error);
                        return null;
                    }),
                3000, null
            );
        };

        // Rewarded video ad function
        function showVKRewardedAd(callbacks) {
            if (window.vkBridgeReady) {
                if (callbacks && callbacks.onOpen) callbacks.onOpen();
                vkBridge.send('VKWebAppShowNativeAds', { ad_format: 'reward' })
                    .then(function(data) {
                        if (data.result) {
                            console.log('Rewarded ad shown successfully');
                            if (callbacks && callbacks.onRewarded) callbacks.onRewarded();
                        }
                        if (callbacks && callbacks.onClose) callbacks.onClose();
                    })
                    .catch(function(error) {
                        console.log('Rewarded ad not shown:', error);
                        if (callbacks && callbacks.onClose) callbacks.onClose();
                    });
            } else {
                // Fallback if VK Bridge not ready
                console.log('VK Bridge not ready, granting reward anyway');
                if (callbacks && callbacks.onRewarded) callbacks.onRewarded();
                if (callbacks && callbacks.onClose) callbacks.onClose();
            }
        }

        // Fullscreen interstitial ad function
        function showVKInterstitialAd(callbacks) {
            if (window.vkBridgeReady) {
                if (callbacks && callbacks.onOpen) callbacks.onOpen();
                vkBridge.send('VKWebAppShowNativeAds', { ad_format: 'interstitial' })
                    .then(function(data) {
                        console.log('Interstitial ad shown, result:', data.result);
                        if (callbacks && callbacks.onClose) callbacks.onClose(data.result);
                    })
                    .catch(function(error) {
                        console.log('Interstitial ad not shown:', error);
                        if (callbacks && callbacks.onClose) callbacks.onClose(false);
                    });
            } else {
                // Fallback if VK Bridge not ready
                if (callbacks && callbacks.onClose) callbacks.onClose(false);
            }
        }

        // IAP purchase function (only for VK, not Odnoklassniki)
        window.showVKPurchase = function(itemId, onSuccess, onError) {
            if (window.isOdnoklassniki) {
                console.log('Purchases not supported in Odnoklassniki');
                if (onError) onError('not_supported');
                return;
            }
            vkBridge.send('VKWebAppShowOrderBox', { type: 'item', item: itemId })
                .then(function(data) {
                    if (data.success) {
                        console.log('Purchase successful, order_id:', data.order_id);
                        if (onSuccess) onSuccess(data.order_id);
                    }
                })
                .catch(function(error) {
                    console.error('Purchase failed or cancelled:', error);
                    if (onError) onError(error);
                });
        };

        // Lifecycle stubs (VK Bridge has no direct equivalents for LoadingAPI/GameplayAPI)
        function notifyGameReady() {}
        function notifyGameplayStart() {}
        function notifyGameplayStop() {}

        // PokiSDK compatibility layer for smooth migration
        window.PokiSDK = {
            init: function() {
                return initVKBridge();
            },
            gameLoadingFinished: function() {
                notifyGameReady();
            },
            gameplayStart: function() {
                notifyGameplayStart();
            },
            gameplayStop: function() {
                notifyGameplayStop();
            },
            commercialBreak: function(callback) {
                return new Promise(function(resolve) {
                    showVKInterstitialAd({
                        onOpen: callback,
                        onClose: function(wasShown) {
                            resolve(wasShown);
                        }
                    });
                });
            },
            rewardedBreak: function(callback) {
                return new Promise(function(resolve) {
                    var rewarded = false;
                    showVKRewardedAd({
                        onOpen: callback,
                        onRewarded: function() {
                            rewarded = true;
                        },
                        onClose: function() {
                            resolve(rewarded);
                        }
                    });
                });
            }
        };
    </script>
</body>
</html>
